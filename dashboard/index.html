<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VoiceEstate Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>

<style>
body { margin:0; font-family:'DM Sans',sans-serif; background:#0b0b12; color:#eee; }
.sidebar { width:200px; background:#111; height:100vh; position:fixed; padding:20px; }
.nav-item { margin:10px 0; cursor:pointer; color:#aaa; }
.nav-item.active { color:#fff; font-weight:bold; }

.main { margin-left:200px; padding:20px; }

.card { background:#151523; padding:16px; border-radius:10px; margin-bottom:20px; }

table { width:100%; border-collapse:collapse; }
th, td { padding:10px; border-bottom:1px solid #222; font-size:13px; }
th { color:#777; text-align:left; }

.badge { padding:4px 8px; border-radius:6px; font-size:11px; }

.green { background:#1f4; color:#000; }
.blue { background:#49f; }
.red { background:#f55; }
.gold { background:#c8a84b; color:#000; }
</style>
</head>

<body>

<div class="sidebar">
  <h2>VoiceEstate</h2>
  <div class="nav-item active" onclick="setPage('dashboard', this)">Dashboard</div>
  <div class="nav-item" onclick="setPage('calls', this)">Çağrılar</div>
  <div class="nav-item" onclick="setPage('appointments', this)">Randevular</div>
</div>

<div class="main" id="main"></div>

<script>

let SUPABASE_URL = '';
let SUPABASE_KEY = '';

let calls = [];
let appointments = [];

let currentPage = 'dashboard';

async function connect() {
  SUPABASE_URL = prompt("Supabase URL");
  SUPABASE_KEY = prompt("Supabase KEY");

  await loadAll();
}

async function loadAll() {
  await loadCalls();
  await loadAppointments();
  render();
}

async function loadCalls() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/calls?select=*&order=created_at.desc`, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
  });
  calls = await res.json();
}

async function loadAppointments() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/appointments?select=*&order=created_at.desc`, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
  });
  appointments = await res.json();
}

function setPage(p, el) {
  currentPage = p;
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render() {
  if (currentPage === 'dashboard') renderDashboard();
  if (currentPage === 'calls') renderCalls();
  if (currentPage === 'appointments') renderAppointments();
}

function renderDashboard() {
  const total = calls.length;
  const appt = calls.filter(c=>c.status==='randevu_alindi').length;
  const hot = calls.filter(c=>(c.lead_score||0)>=75).length;

  document.getElementById('main').innerHTML = `
    <div class="card">
      <h3>Dashboard</h3>
      <p>Toplam çağrı: ${total}</p>
      <p>Randevu: ${appt}</p>
      <p>Sıcak lead: ${hot}</p>
    </div>
  `;
}

function renderCalls() {
  let html = `
    <div class="card">
      <h3>Çağrılar</h3>
      <table>
        <thead>
          <tr>
            <th>Telefon</th>
            <th>Intent</th>
            <th>Skor</th>
            <th>Özet</th>
          </tr>
        </thead>
        <tbody>
  `;

  calls.forEach(c=>{
    html += `
      <tr>
        <td>${c.caller_phone}</td>
        <td>${c.intent || '-'}</td>
        <td>${c.lead_score || 0}</td>
        <td>${c.summary || '-'}</td>
      </tr>
    `;
  });

  html += `</tbody></table></div>`;
  document.getElementById('main').innerHTML = html;
}

function renderAppointments() {
  let html = `
    <div class="card">
      <h3>Randevular</h3>
      <table>
        <thead>
          <tr>
            <th>Müşteri</th>
            <th>Telefon</th>
            <th>Tarih</th>
            <th>Not</th>
          </tr>
        </thead>
        <tbody>
  `;

  appointments.forEach(a=>{
    html += `
      <tr>
        <td>${a.client_name}</td>
        <td>${a.client_phone}</td>
        <td>${a.scheduled_at || 'Belirsiz'}</td>
        <td>${a.notes || ''}</td>
      </tr>
    `;
  });

  html += `</tbody></table></div>`;
  document.getElementById('main').innerHTML = html;
}

connect();

</script>

</body>
</html>

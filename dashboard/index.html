<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VoiceEstate Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07070e;--card:#0f0f1a;--hover:#151523;--border:#1a1a2d;--gold:#c8a84b;--green:#34c97e;--red:#f16b6b;--blue:#5b9cf6;--purple:#9b7ff4;--text:#eaeaf5;--muted:#737397}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#config-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.config-box{width:100%;max-width:440px}.config-logo{text-align:center;margin-bottom:28px}.config-logo .icon{font-size:44px}.config-logo h1{font-family:'Playfair Display',serif;font-size:34px;color:var(--gold)}
.config-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px}
.config-card label{color:var(--muted);font-size:12px;display:block;margin-bottom:8px}
.config-card input{width:100%;padding:12px 14px;background:var(--hover);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:monospace;margin-bottom:16px}
.btn-connect,.btn-primary{background:var(--gold);color:#000;border:none;border-radius:10px;padding:10px 14px;font-weight:800;cursor:pointer}
.btn-connect{width:100%;padding:13px}.err{color:var(--red);font-size:12px;margin-bottom:12px}
#app{display:none;min-height:100vh}.sidebar{width:220px;background:var(--card);border-right:1px solid var(--border);padding:0 12px;display:flex;flex-direction:column}
.sidebar-logo{padding:22px 12px 16px;border-bottom:1px solid var(--border)}.sidebar-logo h2{font-family:'Playfair Display',serif;color:var(--gold)}.sidebar-logo small{color:var(--muted)}
.tenant-card{padding:12px;background:var(--hover);border:1px solid var(--border);border-radius:12px;margin:14px 0}.tenant-card .name{color:var(--gold);font-weight:800}.tenant-card .sub{color:var(--muted);font-size:11px}
.nav-item{padding:11px 12px;border-radius:9px;margin-bottom:3px;color:var(--muted);font-size:13px;cursor:pointer;border:1px solid transparent}.nav-item.active{background:rgba(200,168,75,.15);color:var(--gold);border-color:rgba(200,168,75,.3);font-weight:800}
.btn-disconnect{width:100%;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:8px;font-size:12px;cursor:pointer}.sidebar-footer{margin-top:auto;padding:12px 0;border-top:1px solid var(--border)}
.main{flex:1;display:flex;flex-direction:column}.topbar{padding:14px 28px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;background:rgba(15,15,26,.8)}
.topbar h2{font-family:'Playfair Display',serif;font-size:22px}.topbar small{color:var(--muted)}
.content{padding:24px;display:flex;flex-direction:column;gap:20px;overflow:auto}.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px}.stat-label{color:var(--muted);font-size:10px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}.stat-value{font-family:'Playfair Display',serif;font-size:32px;font-weight:900}.stat-sub{color:var(--muted);font-size:12px;margin-top:6px}
.table-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}.table-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}.title{font-weight:800}.filters{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
.filter-btn,.btn-refresh,.btn-detail{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:5px 11px;cursor:pointer;font-size:12px}.filter-btn.active{border-color:var(--gold);color:var(--gold);font-weight:800}
table{width:100%;border-collapse:collapse}th{padding:10px 16px;text-align:left;color:var(--muted);font-size:10px;letter-spacing:.1em;text-transform:uppercase}td{padding:13px 16px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:top}tr:hover{background:var(--hover)}
.badge{display:inline-block;border-radius:5px;padding:3px 8px;font-size:11px;font-weight:800;text-transform:uppercase}.summary-cell{color:var(--muted);font-size:12px;line-height:1.45;max-width:340px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.score-ring{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900}.empty{padding:60px;text-align:center;color:var(--muted)}
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:999;align-items:center;justify-content:center;padding:24px}#modal-overlay.show{display:flex}.modal{background:var(--card);border:1px solid var(--border);border-radius:18px;width:100%;max-width:760px;max-height:88vh;overflow:auto}.modal-header{padding:20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}.modal-body{padding:20px}.msg{display:flex;gap:10px;margin-bottom:12px}.msg-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800}.msg-text{font-size:13px;line-height:1.6}.btn-close{background:var(--hover);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:20px;padding:4px 12px;cursor:pointer}
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.form-grid label{font-size:11px;color:var(--muted);display:block;margin-bottom:6px}.form-grid input,.form-grid select,.form-grid textarea{width:100%;background:var(--hover);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px}.form-grid textarea{min-height:80px;resize:vertical}.full{grid-column:1/-1}
@media(max-width:1100px){.stats-grid{grid-template-columns:repeat(2,1fr)}.form-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="config-screen">
  <div class="config-box">
    <div class="config-logo"><div class="icon">🏛️</div><h1>VoiceEstate</h1><p style="color:var(--muted)">Supabase bağlantını gir</p></div>
    <div class="config-card">
      <label>Supabase Project URL</label><input id="inp-url" placeholder="https://xxxxx.supabase.co"/>
      <label>Anon Public Key</label><input id="inp-key" type="password" placeholder="eyJ..."/>
      <div id="config-err" class="err" style="display:none"></div>
      <button class="btn-connect" onclick="connect()">Bağlan & Dashboard'u Aç</button>
    </div>
  </div>
</div>

<div id="app">
  <div class="sidebar">
    <div class="sidebar-logo"><h2>VoiceEstate</h2><small>AI Call Platform</small></div>
    <div style="padding:12px 0;flex:1">
      <div class="tenant-card"><div class="name">Atlas Gayrimenkul</div><div class="sub">Emlak · Ankara</div></div>
      <div class="nav-item active" onclick="setPage('dashboard',this)">📊 Dashboard</div>
      <div class="nav-item" onclick="setPage('calls',this)">📞 Çağrılar</div>
      <div class="nav-item" onclick="setPage('leads',this)">🔥 Leadler</div>
      <div class="nav-item" onclick="setPage('appointments',this)">📅 Randevular</div>
      <div class="nav-item" onclick="setPage('properties',this)">🏠 Portföy</div>
      <div class="nav-item" onclick="setPage('matches',this)">🎯 Eşleşmeler</div>
      <div class="nav-item" onclick="setPage('settings',this)">⚙️ Ayarlar</div>
    </div>
    <div class="sidebar-footer"><button class="btn-disconnect" onclick="disconnect()">🔌 Bağlantıyı Değiştir</button></div>
  </div>
  <div class="main">
    <div class="topbar"><div><h2 id="page-title">Dashboard</h2><small id="topbar-date"></small></div><small>15sn'de bir yenileniyor</small></div>
    <div class="content" id="content"></div>
  </div>
</div>

<div id="modal-overlay" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header"><div><b id="modal-title"></b><div id="modal-meta" style="margin-top:8px"></div></div><button class="btn-close" onclick="closeModal()">×</button></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
let SUPABASE_URL='',SUPABASE_KEY='',allCalls=[],allAppointments=[],allLeads=[],allProperties=[],currentPage='dashboard',currentFilter='ALL',refreshTimer=null;
const INTENT={SATIN_ALMA:{label:'Satın Alma',color:'#34c97e',emoji:'🏠'},KIRA:{label:'Kiralama',color:'#5b9cf6',emoji:'🔑'},SATIS:{label:'Satış',color:'#c8a84b',emoji:'💰'},BILGI:{label:'Bilgi',color:'#9b7ff4',emoji:'💬'}};

function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function money(v){return v?Number(v).toLocaleString('tr-TR')+' ₺':'—'}
function fmtDate(ts){return ts?new Date(ts).toLocaleString('tr-TR'):'—'}
function scoreColor(s){return s>=75?'#34c97e':s>=45?'#c8a84b':'#f16b6b'}
function temp(t,s){return t==='hot'||s>=75?'Sıcak':t==='warm'||s>=45?'Ilık':'Soğuk'}

async function connect(){
  const url=document.getElementById('inp-url').value.trim(),key=document.getElementById('inp-key').value.trim(),err=document.getElementById('config-err');
  try{
    const res=await fetch(`${url}/rest/v1/calls?select=id&limit=1`,{headers:{apikey:key,Authorization:`Bearer ${key}`}});
    if(!res.ok)throw new Error(await res.text());
    SUPABASE_URL=url;SUPABASE_KEY=key;localStorage.setItem('ve_url',url);localStorage.setItem('ve_key',key);showApp();
  }catch(e){err.textContent='Bağlantı hatası: '+e.message;err.style.display='block'}
}
function disconnect(){localStorage.removeItem('ve_url');localStorage.removeItem('ve_key');location.reload()}
function showApp(){document.getElementById('config-screen').style.display='none';document.getElementById('app').style.display='flex';document.getElementById('topbar-date').textContent=new Date().toLocaleDateString('tr-TR',{weekday:'long',day:'numeric',month:'long'});loadAll();refreshTimer=setInterval(loadAll,15000)}
async function sb(path){const r=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}});return r.ok?await r.json():[]}
async function loadAll(){[allCalls,allAppointments,allLeads,allProperties]=await Promise.all([sb('calls?select=*&order=created_at.desc&limit=200'),sb('appointments?select=*&order=created_at.desc&limit=200'),sb('leads?select=*&order=updated_at.desc&limit=200'),sb('properties?select=*&order=created_at.desc&limit=200')]);renderPage()}

function setPage(p,el){currentPage=p;document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));el.classList.add('active');renderPage()}
function renderPage(){document.getElementById('page-title').textContent={dashboard:'Dashboard',calls:'Çağrılar',leads:'Leadler',appointments:'Randevular',properties:'Portföy',matches:'Eşleşmeler',settings:'Ayarlar'}[currentPage];if(currentPage==='dashboard')renderDashboard();if(currentPage==='calls')renderCalls();if(currentPage==='leads')renderLeads();if(currentPage==='appointments')renderAppointments();if(currentPage==='properties')renderProperties();if(currentPage==='matches')renderMatches();if(currentPage==='settings')renderSettings()}

function stats(){
  const hot=allLeads.filter(l=>(l.lead_score||0)>=75).length;
  const avg=allCalls.length?Math.round(allCalls.reduce((a,c)=>a+(c.lead_score||0),0)/allCalls.length):0;
  return `<div class="stats-grid">
    <div class="stat-card" style="border-top:2px solid var(--gold)"><div class="stat-label">Toplam Çağrı</div><div class="stat-value" style="color:var(--gold)">${allCalls.length}</div><div class="stat-sub">AI çağrı kaydı</div></div>
    <div class="stat-card" style="border-top:2px solid var(--red)"><div class="stat-label">Sıcak Lead</div><div class="stat-value" style="color:var(--red)">${hot}</div><div class="stat-sub">Skor ≥ 75</div></div>
    <div class="stat-card" style="border-top:2px solid var(--green)"><div class="stat-label">Randevu</div><div class="stat-value" style="color:var(--green)">${allAppointments.length}</div><div class="stat-sub">AI oluşturdu</div></div>
    <div class="stat-card" style="border-top:2px solid var(--blue)"><div class="stat-label">Portföy</div><div class="stat-value" style="color:var(--blue)">${allProperties.length}</div><div class="stat-sub">Aktif ilan</div></div>
    <div class="stat-card" style="border-top:2px solid var(--purple)"><div class="stat-label">Ort. Skor</div><div class="stat-value" style="color:var(--purple)">${avg}</div><div class="stat-sub">0-100</div></div>
  </div>`;
}

function renderDashboard(){document.getElementById('content').innerHTML=stats()+callsTable(allCalls.slice(0,8),'Son Çağrılar')+appointmentsTable(allAppointments.slice(0,6),'Son Randevular')}
function renderCalls(){document.getElementById('content').innerHTML=stats()+callsTable(currentFilter==='ALL'?allCalls:allCalls.filter(c=>c.intent===currentFilter),'Çağrılar',true)}
function setFilter(f){currentFilter=f;renderCalls()}

function callsTable(rows,title,filters=false){
  const f=filters?`<div class="filters"><button class="filter-btn ${currentFilter==='ALL'?'active':''}" onclick="setFilter('ALL')">Tümü</button><button class="filter-btn ${currentFilter==='SATIN_ALMA'?'active':''}" onclick="setFilter('SATIN_ALMA')">🏠 Satın Alma</button><button class="filter-btn ${currentFilter==='KIRA'?'active':''}" onclick="setFilter('KIRA')">🔑 Kiralama</button><button class="filter-btn ${currentFilter==='SATIS'?'active':''}" onclick="setFilter('SATIS')">💰 Satış</button><button class="filter-btn ${currentFilter==='BILGI'?'active':''}" onclick="setFilter('BILGI')">💬 Bilgi</button></div>`:'';
  if(!rows.length)return `<div class="table-card"><div class="table-header"><div class="title">${title}</div>${f}</div><div class="empty">Kayıt yok.</div></div>`;
  let h=`<div class="table-card"><div class="table-header"><div class="title">📞 ${title}</div>${f}</div><table><thead><tr><th>Tarih</th><th>Numara</th><th>Intent</th><th>Özet</th><th>Durum</th><th>Skor</th><th></th></tr></thead><tbody>`;
  rows.forEach(c=>{const i=INTENT[c.intent]||INTENT.BILGI,col=scoreColor(c.lead_score||0);h+=`<tr><td>${fmtDate(c.created_at)}</td><td style="font-family:monospace">${esc(c.caller_phone)}</td><td><span class="badge" style="background:${i.color}18;color:${i.color};border:1px solid ${i.color}35">${i.emoji} ${i.label}</span></td><td><div class="summary-cell">${esc(c.summary)}</div></td><td><span class="badge" style="background:#5b9cf618;color:var(--blue);border:1px solid #5b9cf635">${esc(c.status)}</span></td><td><div class="score-ring" style="border:2.5px solid ${col};color:${col};background:${col}12">${c.lead_score||0}</div></td><td><button class="btn-detail" onclick="openCall('${c.id}')">Detay</button></td></tr>`});
  return h+`</tbody></table></div>`;
}

function renderLeads(){
  let h=stats()+`<div class="table-card"><div class="table-header"><div class="title">🔥 Leadler</div></div><table><thead><tr><th>Müşteri</th><th>Telefon</th><th>Skor</th><th>Intent</th><th>Bölge</th><th>Oda</th><th>Bütçe</th><th>Uygun İlan</th><th>Özet</th></tr></thead><tbody>`;
  allLeads.forEach(l=>{const m=matchProperties(l).length,col=scoreColor(l.lead_score||0);h+=`<tr><td>${esc(l.name||'Bilinmeyen')}</td><td>${esc(l.phone)}</td><td><span class="badge" style="background:${col}18;color:${col};border:1px solid ${col}35">${temp(l.temperature,l.lead_score)} · ${l.lead_score||0}</span></td><td>${esc(l.intent)}</td><td>${esc(l.district||'—')}</td><td>${esc(l.room_count||'—')}</td><td>${esc(l.budget||'—')}</td><td><button class="btn-detail" onclick="openLeadMatches('${l.id}')">${m} ilan</button></td><td><div class="summary-cell">${esc(l.summary||'—')}</div></td></tr>`});
  document.getElementById('content').innerHTML=h+`</tbody></table></div>`;
}

function renderAppointments(){document.getElementById('content').innerHTML=appointmentsTable(allAppointments,'Randevular')}
function appointmentsTable(rows,title){
  let h=`<div class="table-card"><div class="table-header"><div class="title">📅 ${title}</div></div><table><thead><tr><th>Müşteri</th><th>Telefon</th><th>Tarih</th><th>Tip</th><th>Durum</th><th>Not</th></tr></thead><tbody>`;
  rows.forEach(a=>h+=`<tr><td>${esc(a.client_name)}</td><td>${esc(a.client_phone)}</td><td>${a.scheduled_at?fmtDate(a.scheduled_at):'Tarih netleşmedi'}</td><td>${esc(a.appointment_type)}</td><td><span class="badge" style="background:#34c97e18;color:var(--green);border:1px solid #34c97e35">${esc(a.status)}</span></td><td><div class="summary-cell">${esc(a.notes)}</div></td></tr>`);
  return h+`</tbody></table></div>`;
}

function renderProperties(){
  let h=stats()+`<div class="table-card"><div class="table-header"><div class="title">🏠 Portföy</div><div class="filters"><button class="btn-primary" onclick="openPropertyForm()">+ Yeni İlan Ekle</button></div></div><table><thead><tr><th>İlan</th><th>Tip</th><th>Bölge</th><th>Oda</th><th>m²</th><th>Fiyat</th><th>Durum</th><th>Açıklama</th></tr></thead><tbody>`;
  allProperties.forEach(p=>h+=`<tr><td><b>${esc(p.title)}</b></td><td>${esc(p.listing_type)}</td><td>${esc([p.district,p.neighborhood].filter(Boolean).join(' / '))}</td><td>${esc(p.room_count)}</td><td>${p.square_meters||'—'}</td><td>${money(p.price)}</td><td><span class="badge" style="background:#34c97e18;color:var(--green);border:1px solid #34c97e35">${esc(p.status)}</span></td><td><div class="summary-cell">${esc(p.description)}</div></td></tr>`);
  document.getElementById('content').innerHTML=h+`</tbody></table></div>`;
}

function openPropertyForm(){
  document.getElementById('modal-title').textContent='Yeni İlan Ekle';
  document.getElementById('modal-meta').innerHTML='Portföy kaydı Supabase properties tablosuna eklenecek';
  document.getElementById('modal-body').innerHTML=`
    <div class="form-grid">
      <div class="full"><label>İlan Başlığı</label><input id="p-title" placeholder="Ankara Yeni Batı 3+1 Satılık Daire"/></div>
      <div><label>İlan Tipi</label><select id="p-listing"><option value="SATIN_ALMA">Satılık</option><option value="KIRA">Kiralık</option></select></div>
      <div><label>Mülk Tipi</label><select id="p-type"><option value="daire">Daire</option><option value="villa">Villa</option><option value="arsa">Arsa</option><option value="ofis">Ofis</option></select></div>
      <div><label>İl / Bölge</label><input id="p-district" placeholder="Ankara"/></div>
      <div><label>Mahalle</label><input id="p-neighborhood" placeholder="Yeni Batı Mahallesi"/></div>
      <div><label>Oda Sayısı</label><input id="p-room" placeholder="3+1"/></div>
      <div><label>Fiyat</label><input id="p-price" type="number" placeholder="4500000"/></div>
      <div><label>m²</label><input id="p-sqm" type="number" placeholder="135"/></div>
      <div><label>Kat</label><input id="p-floor" placeholder="5. Kat"/></div>
      <div class="full"><label>Açıklama</label><textarea id="p-desc" placeholder="İlan açıklaması"></textarea></div>
      <div class="full"><label>Danışman Notu</label><textarea id="p-note" placeholder="Hangi leadlere önerilsin?"></textarea></div>
      <div class="full" style="display:flex;gap:10px;justify-content:flex-end"><button class="btn-detail" onclick="closeModal()">Vazgeç</button><button class="btn-primary" onclick="createProperty()">İlanı Kaydet</button></div>
    </div>`;
  document.getElementById('modal-overlay').classList.add('show');
}

async function createProperty(){
  const payload={
    title:document.getElementById('p-title').value.trim(),
    listing_type:document.getElementById('p-listing').value,
    property_type:document.getElementById('p-type').value,
    district:document.getElementById('p-district').value.trim(),
    neighborhood:document.getElementById('p-neighborhood').value.trim(),
    room_count:document.getElementById('p-room').value.trim(),
    price:Number(document.getElementById('p-price').value||0),
    square_meters:Number(document.getElementById('p-sqm').value||0),
    floor:document.getElementById('p-floor').value.trim(),
    description:document.getElementById('p-desc').value.trim(),
    contact_note:document.getElementById('p-note').value.trim(),
    status:'active',
    currency:'TRY'
  };
  if(!payload.title){alert('İlan başlığı zorunlu');return}
  const res=await fetch(`${SUPABASE_URL}/rest/v1/properties`,{
    method:'POST',
    headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json',Prefer:'return=representation'},
    body:JSON.stringify(payload)
  });
  if(!res.ok){alert('İlan eklenemedi: '+await res.text());return}
  closeModal();
  await loadAll();
  currentPage='properties';
  renderProperties();
}

function matchProperties(l){
  return allProperties.filter(p=>{
    let score=0;
    if(l.intent&&p.listing_type===l.intent)score+=3;
    const leadArea=String(l.district||'').toLowerCase();
    const propArea=String((p.district||'')+' '+(p.neighborhood||'')).toLowerCase();
    if(leadArea&&propArea.includes(leadArea.split(' ')[0]))score+=2;
    if(l.room_count&&p.room_count===l.room_count)score+=2;
    return score>=3;
  }).slice(0,5);
}
function renderMatches(){
  let h=stats()+`<div class="table-card"><div class="table-header"><div class="title">🎯 Lead - Portföy Eşleşmeleri</div></div>`;
  allLeads.forEach(l=>{const ms=matchProperties(l);h+=`<div style="padding:18px 20px;border-bottom:1px solid var(--border)"><b>${esc(l.phone)} · ${esc(l.intent)} · ${l.lead_score||0}</b><div style="color:var(--muted);font-size:12px;margin-top:4px">${esc(l.summary||'')}</div><div style="margin-top:12px;display:grid;gap:8px">${ms.length?ms.map(p=>`<div style="background:var(--hover);border:1px solid var(--border);border-radius:10px;padding:12px"><b>${esc(p.title)}</b><div style="color:var(--muted);font-size:12px;margin-top:4px">${esc(p.neighborhood||p.district)} · ${esc(p.room_count)} · ${money(p.price)}</div></div>`).join(''):'<span style="color:var(--muted)">Uygun ilan bulunamadı.</span>'}</div></div>`});
  document.getElementById('content').innerHTML=h+`</div>`;
}

function renderSettings(){document.getElementById('content').innerHTML=`<div class="table-card"><div class="table-header"><div class="title">⚙️ Ayarlar</div></div><div style="padding:22px;color:var(--muted)">Supabase: ${esc(SUPABASE_URL)}<br><br>Sonraki: SMS, tenant auth, Vapi prompt yönetimi.</div></div>`}

function openCall(id){const c=allCalls.find(x=>x.id===id);if(!c)return;document.getElementById('modal-title').textContent=c.caller_phone||'Çağrı';document.getElementById('modal-meta').innerHTML=`${esc(c.intent)} · Skor ${c.lead_score||0}`;const msgs=(Array.isArray(c.transcript)?c.transcript:[]).filter(m=>m.role!=='system');document.getElementById('modal-body').innerHTML=`<p style="color:var(--muted);margin-bottom:16px">${esc(c.summary)}</p>`+msgs.map(m=>`<div class="msg"><div class="msg-avatar" style="background:${m.role==='bot'?'#c8a84b22':'#5b9cf622'};color:${m.role==='bot'?'var(--gold)':'var(--blue)'}">${m.role==='bot'?'AI':'M'}</div><div class="msg-text">${esc(m.message||m.content||'')}</div></div>`).join('');document.getElementById('modal-overlay').classList.add('show')}
function openLeadMatches(id){const l=allLeads.find(x=>x.id===id),ms=matchProperties(l);document.getElementById('modal-title').textContent='Uygun İlanlar';document.getElementById('modal-meta').innerHTML=`${esc(l.phone)} · ${esc(l.intent)} · ${l.lead_score||0}`;document.getElementById('modal-body').innerHTML=ms.length?ms.map(p=>`<div style="background:var(--hover);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px"><b>${esc(p.title)}</b><div style="color:var(--muted);margin-top:5px">${esc(p.neighborhood||p.district)} · ${esc(p.room_count)} · ${money(p.price)}</div><p style="margin-top:8px;color:var(--muted);font-size:13px">${esc(p.description)}</p></div>`).join(''):'Uygun ilan yok.';document.getElementById('modal-overlay').classList.add('show')}
function closeModal(){document.getElementById('modal-overlay').classList.remove('show')}

window.addEventListener('load',()=>{const u=localStorage.getItem('ve_url'),k=localStorage.getItem('ve_key');if(u&&k){SUPABASE_URL=u;SUPABASE_KEY=k;showApp()}});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
</script>
</body>
</html>
